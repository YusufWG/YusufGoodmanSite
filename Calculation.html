<!DOCTYPE html>
<html>
<head>
    <title>Basic jQuery Calculator</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  
</head>

<body>

<h1>Online Calculator</h1>

<div>


<style>

body {
    background-color: f4f1de;
    font-family: Arial, Arial, Helvetica, sans-serif;
    text-align: center;
    font-weight: bold;
}

h1 {

    text-align: center;
    font-size: 80 px;
    text-decoration: underline;

}

#calculatorBox {
    background-color: #dda15e;
    width: 400px;
    margin: 40px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 4px 8px gray;
}






</style>

<p>Please Enter The First Numerical Value:</p>
<input type="text" id="num1">

<p>Please Enter The Second Numerical Value:</p>
<input type="text" id="num2">

<p>Choose an operation:</p>
<select id="operation">
    <option value="+">Addition (+)</option>
    <option value="-">Subtraction (-)</option>
    <option value="*">Multiplication (*)</option>
    <option value="/">Division (/)</option>
</select>

<p> Result Illustration Color: (ex: Black, Blue, Green, ect.):</p>
<input type="text" id="color">

<br><br>

<button id="button">Calculate</button>

<h2 id="result">The result will appear here</h2>

</body>

  <script>
    $(document).ready(function() {

        $("#button").click(function() {

            var number1 = parseFloat($("#num1").val());
            var number2 = parseFloat($("#num2").val());
            var operation = $("#operation").val();
            var color = $("#color").val();

            var answer;

            if (operation == "+") {
                answer = number1 + number2;
            }
            else if (operation == "-") {
                answer = number1 - number2;
            }
            else if (operation == "*") {
                answer = number1 * number2;
            }
            else if (operation == "/") {
                if (number2 == 0) {
                    answer = "According to mathematical rules you can't divide by 0 the result would be undefined.";
                }
                else {
                    answer = number1 / number2;
                }
            }

            $("#result").text("The result is: " + answer);
            $("#result").css("color", color);

        });

    });
    </script>
    </div>
</html>
